<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forecast — WindCast FYP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages.css"/>
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand"><div class="brand__mark">WC</div><div><div class="brand__title">WindCast FYP</div><div class="brand__subtitle">Forecast Viewer</div></div></div>
      <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="map.html">Map</a>
        <a class="active" href="forecast.html">Forecast</a>
        <a class="cta" href="report.html">Report</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="h2">Multi-horizon Forecasts (Lead 1 / 3 / 6)</h1>
    <p class="p muted">Loaded from <code>future_forecast_all_stations_1_3_6m_long.csv</code>.</p>

    <div class="controls">
      <div class="control">
        <label>Station</label>
        <select id="stationSelect"></select>
      </div>
      <div class="control">
        <label>Quick</label>
        <a class="btn ghost" id="toStation" href="#">Station Page</a>
      </div>
      <div class="control">
        <label>PDF</label>
        <a class="btn primary" id="toReport" href="#">Download Report</a>
      </div>
    </div>

    <div class="grid2">
      <div class="panel">
        <canvas id="chart" height="140"></canvas>
      </div>
      <div class="panel">
        <table class="table">
          <thead>
            <tr><th>Station</th><th>Lead (months)</th><th>Date</th><th>Forecast</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>Chart.js (CDN)</div>
      <div>Forecast viewer</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="../js/app/forecastPage.js"></script>
</body>
</html>
